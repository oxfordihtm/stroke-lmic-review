name: Quarto publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    container: rocker/tidyverse:4.6.0
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GIT_CRYPT_KEY64: ${{ secrets.GIT_CRYPT_KEY64 }}
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
          libxt6 libglpk-dev libuv1-dev cmake git-crypt \
          libpoppler-cpp-dev libmagick++-dev \
          libtesseract-dev libleptonica-dev tesseract-ocr-eng

      - name: Trust git repo
        run: |
          git config --global --add safe.directory /__w/stroke-lmic-review/stroke-lmic-review

      - name: Decrypt repository using symmetric key
        run: |
          echo $GIT_CRYPT_KEY64 > git_crypt_key.key64 && base64 -di git_crypt_key.key64 > git_crypt_key.key && git-crypt unlock git_crypt_key.key
          rm git_crypt_key.key git_crypt_key.key64
          
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install packages from renv.lock (with cache)
        if: ${{ !env.ACT }}  
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Install packages from renv.lock (local, no cache)
        if: ${{ env.ACT }}  
        run: |
          renv::restore()
        shell: Rscript {0}
        
      - name: Render reports
        run: |
          targets::tar_make(preliminary_report)
        shell: Rscript {0}

      - name: Move reports to docs directory
        run: |
          cp reports/preliminary_report.html cp docs/preliminary_report

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
